name: 清大物理考古系統 考古題缺失回報
description: 回報系統中遺漏、無法開啟或資料不正確的物理系考古題
title: "[考古題缺失] <課程名稱> - <授課教師>"
labels: ["missing-exam"]
body:
  - type: markdown
    attributes:
      value: |
        ## 清大物理考古系統 考古題缺失回報

        若你發現考古題遺漏、檔案無法開啟，或課程、教師、學期與考試類型等資料不正確，請填寫下列資訊。

        若你持有可補充的題目或解答 PDF，也可登入系統使用投稿功能上傳，並於備註附上投稿資訊。

        > 標題範例：`[考古題缺失] 電磁學(一) - 王小明`

  - type: input
    id: course
    attributes:
      label: 課程名稱
      placeholder: 例如：電磁學(一)
    validations:
      required: true

  - type: input
    id: professor
    attributes:
      label: 授課教師
      placeholder: 例如：王小明
    validations:
      required: true

  - type: dropdown
    id: academic_term
    attributes:
      label: 學期
      description: 請選擇資料所屬學期；若不確定可選擇「不確定」並在備註補充。
      options:
        - 上學期
        - 下學期
        - 不確定
    validations:
      required: true

  - type: input
    id: academic_year
    attributes:
      label: 學年度
      description: 請使用民國學年度。
      placeholder: 例如：114
    validations:
      required: true

  - type: dropdown
    id: exam_type
    attributes:
      label: 考試類型
      options:
        - 期中考
        - 期末考
        - 小考
        - 其他或不確定
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 缺失或錯誤情況
      description: 請說明缺少的題目或解答、無法開啟的檔案，或需要修正的資料。
      placeholder: 例如：114 上學期第一次期中考缺少解答 PDF。
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 備註
      description: 可補充投稿編號、可公開的資料來源或其他協助查找的資訊；請勿填入帳號或敏感資訊。
