name: CI/CD Pipeline

on:
  push:
    branches-ignore:
      - "analytics-assets"

permissions:
  contents: read
  packages: write

jobs:
  changes:
    name: Detect CI scope
    runs-on: ubuntu-latest
    outputs:
      run_checks: ${{ steps.scope.outputs.run_checks }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: scope
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          run_full_ci_fallback() {
            echo "$1" >&2
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
            echo "Run expensive CI: true"
            exit 0
          }

          if [ "$REF_NAME" = "main" ]; then
            if [[ "$BEFORE_SHA" =~ ^0+$ ]] ||
              ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              if ! base="$(git rev-parse "${CURRENT_SHA}^")"; then
                run_full_ci_fallback \
                  "Unable to determine the previous commit; running full CI."
              fi
            else
              base="$BEFORE_SHA"
            fi
          else
            if ! git fetch --no-tags origin main; then
              run_full_ci_fallback \
                "Unable to fetch origin/main; running full CI."
            fi
            if ! base="$(git merge-base "$CURRENT_SHA" origin/main)"; then
              run_full_ci_fallback \
                "Unable to determine the merge base; running full CI."
            fi
          fi

          echo "Comparing $base..$CURRENT_SHA"

          mapfile -t changed_files < <(
            git diff \
              --name-only \
              --no-renames \
              "$base" \
              "$CURRENT_SHA"
          )

          printf 'Changed files:\n'
          printf ' - %s\n' "${changed_files[@]}"

          run_checks=false

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "No changed files detected; running CI as a safe fallback."
            run_checks=true
          fi

          for path in "${changed_files[@]}"; do
            if [[ "$path" =~ ^[^/]+\.md$ ]] ||
              [[ "$path" == docs/* ]] ||
              [[ "$path" =~ ^LICENSE[^/]*$ ]] ||
              [[ "$path" == .github/ISSUE_TEMPLATE/* ]] ||
              [[ "$path" == .github/PULL_REQUEST_TEMPLATE.md ]] ||
              [[ "$path" == .github/PULL_REQUEST_TEMPLATE/* ]] ||
              [[ "$path" =~ ^\.github/.+\.md$ ]] ||
              [[ "$path" == .github/assets/* ]]; then
              echo "Documentation-only path: $path"
              continue
            fi

            echo "CI-relevant path: $path"
            run_checks=true
          done

          echo "run_checks=$run_checks" >> "$GITHUB_OUTPUT"
          echo "Run expensive CI: $run_checks"

  lint:
    needs: changes
    if: ${{ always() && needs.changes.result == 'success' }}
    uses: ./.github/workflows/lint.yml
    with:
      run_checks: ${{ needs.changes.outputs.run_checks == 'true' }}

  test:
    needs: [changes, lint]
    if: ${{ always() && needs.changes.result == 'success' }}
    uses: ./.github/workflows/test.yml
    with:
      run_checks: >-
        ${{ needs.changes.outputs.run_checks == 'true' &&
            needs.lint.result == 'success' }}

  build:
    needs: [changes, lint, test]
    if: ${{ always() && needs.changes.result == 'success' }}
    uses: ./.github/workflows/build.yml
    with:
      run_checks: >-
        ${{ needs.changes.outputs.run_checks == 'true' &&
            needs.lint.result == 'success' &&
            needs.test.result == 'success' }}
      push_images: ${{ github.ref == 'refs/heads/main' }}
    secrets: inherit

  deploy:
    needs: [changes, lint, test, build]
    if: >-
      always() &&
      needs.changes.outputs.run_checks == 'true' &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      needs.build.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      vars.PRODUCTION_DEPLOY_ENABLED == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      release_sha: ${{ github.sha }}
      frontend_image_digest: ${{ needs.build.outputs.frontend_digest }}
      backend_image_digest: ${{ needs.build.outputs.backend_digest }}
    secrets: inherit
