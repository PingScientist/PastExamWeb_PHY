name: CI/CD Pipeline

on:
  push:
    branches-ignore:
      - "analytics-assets"
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE*"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".github/**/*.md"
      - ".github/assets/**"

permissions:
  contents: read
  packages: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    needs: lint
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    uses: ./.github/workflows/build.yml
    with:
      push_images: ${{ github.ref == 'refs/heads/main' }}
    secrets: inherit

  deploy:
    needs: build
    if: >-
      github.ref == 'refs/heads/main' &&
      vars.PRODUCTION_DEPLOY_ENABLED == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      release_sha: ${{ github.sha }}
      frontend_image_digest: ${{ needs.build.outputs.frontend_digest }}
      backend_image_digest: ${{ needs.build.outputs.backend_digest }}
    secrets: inherit
