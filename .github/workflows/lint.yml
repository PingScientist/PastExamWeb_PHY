name: Lint

on:
  workflow_call:
    inputs:
      run_checks:
        description: Run the expensive CI jobs
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  frontend:
    if: ${{ inputs.run_checks }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./frontend

      - name: Run lint
        run: pnpm lint
        working-directory: ./frontend

  backend:
    if: ${{ inputs.run_checks }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        run: pip install uv

      - name: Sync backend dependencies
        run: uv sync --dev
        working-directory: ./backend

      - name: Run ruff
        run: uv run ruff check app tests
        working-directory: ./backend
