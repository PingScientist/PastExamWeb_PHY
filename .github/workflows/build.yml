name: Build Images

on:
  workflow_call:
    inputs:
      push_images:
        description: Push images to GHCR after a successful build
        required: false
        type: boolean
        default: false
    outputs:
      frontend_digest:
        description: Immutable digest for the frontend image
        value: ${{ jobs.frontend.outputs.digest }}
      backend_digest:
        description: Immutable digest for the backend image
        value: ${{ jobs.backend.outputs.digest }}

permissions:
  contents: read
  packages: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: inputs.push_images
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate production frontend configuration
        if: inputs.push_images
        shell: bash
        env:
          FRONTEND_API_BASE_URL: ${{ secrets.FRONTEND_API_BASE_URL }}
          FRONTEND_SITE_HOSTNAME: ${{ secrets.FRONTEND_SITE_HOSTNAME }}
          FRONTEND_UMAMI_SCRIPT_URL: ${{ secrets.FRONTEND_UMAMI_SCRIPT_URL }}
          FRONTEND_UMAMI_WEBSITE_ID: ${{ secrets.FRONTEND_UMAMI_WEBSITE_ID }}
        run: |
          set -euo pipefail

          missing=()
          for name in \
            FRONTEND_API_BASE_URL \
            FRONTEND_SITE_HOSTNAME \
            FRONTEND_UMAMI_SCRIPT_URL \
            FRONTEND_UMAMI_WEBSITE_ID
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required Secret: %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Build Frontend Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ inputs.push_images }}
          platforms: linux/amd64
          tags: |
            ghcr.io/nthu-physics-sa-it/pastexam:frontend
            ghcr.io/nthu-physics-sa-it/pastexam:frontend-${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.FRONTEND_API_BASE_URL }}
            VITE_SITE_HOSTNAME=${{ secrets.FRONTEND_SITE_HOSTNAME }}
            VITE_UMAMI_SCRIPT_URL=${{ secrets.FRONTEND_UMAMI_SCRIPT_URL }}
            VITE_UMAMI_WEBSITE_ID=${{ secrets.FRONTEND_UMAMI_WEBSITE_ID }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  backend:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: inputs.push_images
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ inputs.push_images }}
          platforms: linux/amd64
          tags: |
            ghcr.io/nthu-physics-sa-it/pastexam:backend
            ghcr.io/nthu-physics-sa-it/pastexam:backend-${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
