name: Prepare Production Candidate

on:
  workflow_call:
    inputs:
      release_sha:
        description: Commit SHA to prepare as an isolated production candidate
        required: true
        type: string
      frontend_image_digest:
        description: Immutable digest published for the frontend release image
        required: true
        type: string
      backend_image_digest:
        description: Immutable digest published for the backend release image
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-candidate
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production-acceptance

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_sha }}

      - name: Validate release commit
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          FRONTEND_IMAGE_DIGEST: ${{ inputs.frontend_image_digest }}
          BACKEND_IMAGE_DIGEST: ${{ inputs.backend_image_digest }}
        run: |
          set -euo pipefail

          checked_out_sha="$(git rev-parse HEAD)"
          if [ "$checked_out_sha" != "$RELEASE_SHA" ]; then
            echo "Checked out $checked_out_sha instead of $RELEASE_SHA" >&2
            exit 1
          fi

          if [[ ! "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Release SHA is not a full lowercase commit SHA." >&2
            exit 1
          fi

          for digest in "$FRONTEND_IMAGE_DIGEST" "$BACKEND_IMAGE_DIGEST"; do
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Build did not provide an immutable image digest." >&2
              exit 1
            fi
          done

      - name: Package candidate checkout
        id: package
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          output_archive="$RUNNER_TEMP/pastexam-$RELEASE_SHA-$RUN_ID.tar.gz"
          OUTPUT_ARCHIVE="$output_archive" \
            ./scripts/package-production-candidate.sh

          source_archive_sha256="$(
            sha256sum "$output_archive" |
              cut -d ' ' -f 1
          )"
          release_files_sha256="$(
            tar -xOzf "$output_archive" .release-files.sha256 |
              sha256sum |
              cut -d ' ' -f 1
          )"

          echo "source_archive_sha256=$source_archive_sha256" \
            >>"$GITHUB_OUTPUT"
          echo "release_files_sha256=$release_files_sha256" \
            >>"$GITHUB_OUTPUT"

      - name: Configure strict SSH host verification
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.DO_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          test -n "$SSH_PRIVATE_KEY"
          test -n "$KNOWN_HOSTS"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload isolated candidate archive
        shell: bash
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          test -n "$DO_HOST"
          test -n "$DO_USER"

          scp \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$RUNNER_TEMP/pastexam-$RELEASE_SHA-$RUN_ID.tar.gz" \
            "$DO_USER@$DO_HOST:/tmp/pastexam-$RELEASE_SHA-$RUN_ID.tar.gz"

      - name: Prepare and validate isolated candidate
        shell: bash
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          RUN_ID: ${{ github.run_id }}
          FRONTEND_IMAGE_DIGEST: ${{ inputs.frontend_image_digest }}
          BACKEND_IMAGE_DIGEST: ${{ inputs.backend_image_digest }}
          SOURCE_ARCHIVE_SHA256: ${{ steps.package.outputs.source_archive_sha256 }}
          RELEASE_FILES_SHA256: ${{ steps.package.outputs.release_files_sha256 }}
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$DO_USER@$DO_HOST" \
            "RELEASE_SHA='$RELEASE_SHA' \
            RUN_ID='$RUN_ID' \
            FRONTEND_IMAGE_DIGEST='$FRONTEND_IMAGE_DIGEST' \
            BACKEND_IMAGE_DIGEST='$BACKEND_IMAGE_DIGEST' \
            SOURCE_ARCHIVE_SHA256='$SOURCE_ARCHIVE_SHA256' \
            RELEASE_FILES_SHA256='$RELEASE_FILES_SHA256' \
            ARCHIVE_PATH='/tmp/pastexam-$RELEASE_SHA-$RUN_ID.tar.gz' \
            bash -s" \
            <scripts/prepare-production-candidate.sh

      - name: Clean up run-specific remote files
        if: always()
        shell: bash
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          test -n "$DO_HOST"
          test -n "$DO_USER"

          ssh \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$DO_USER@$DO_HOST" \
            "rm -f -- \
              '/tmp/pastexam-$RELEASE_SHA-$RUN_ID.tar.gz'; \
            if [ -e \
              '/opt/pastexam-releases/$RELEASE_SHA.staging-$RUN_ID' \
            ]; then \
              rm -rf -- \
                '/opt/pastexam-releases/$RELEASE_SHA.staging-$RUN_ID'; \
            fi"
