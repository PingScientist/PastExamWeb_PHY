name: Validate PR base branch

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

jobs:
  check-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require pull requests to target main
        shell: bash
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          if [ "$BASE_BRANCH" != "main" ]; then
            echo "Pull requests must target main; received: $BASE_BRANCH" >&2
            exit 1
          fi

          echo "Pull request base branch is main."
