name: Generate Umami Screenshot

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Check Umami share URL
        id: preflight
        env:
          UMAMI_SHARE_URL: ${{ secrets.UMAMI_SHARE_URL }}
        run: node .github/scripts/umami-preflight.mjs

      - name: Cache Playwright
        if: steps.preflight.outputs.enabled == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-umami-playwright-1.61.1

      - name: Install Playwright
        if: steps.preflight.outputs.enabled == 'true'
        run: |
          npm install --no-save --no-package-lock @playwright/test@1.61.1
          npx playwright install --with-deps chromium

      - name: Run screenshot script
        id: screenshot
        if: steps.preflight.outputs.enabled == 'true'
        env:
          UMAMI_SHARE_URL: ${{ secrets.UMAMI_SHARE_URL }}
        run: node .github/scripts/capture-umami.mjs

      - name: Upload screenshot diagnostics
        if: failure() && steps.preflight.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: umami-screenshot-diagnostics
          path: dist/diagnostics
          if-no-files-found: ignore
          retention-days: 7

      - name: Push png to output branch
        if: steps.preflight.outputs.enabled == 'true'
        uses: crazy-max/ghaction-github-pages@v5.0.0
        with:
          target_branch: umami
          build_dir: dist
          keep_history: true
          allow_empty_commit: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
