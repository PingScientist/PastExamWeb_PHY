name: ${COMPOSE_PROJECT_NAME:?Set an isolated acceptance project name}

x-backend-environment: &backend-environment
  DB_HOST: db
  DB_PORT: "5432"
  DB_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
  DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
  DB_NAME: ${POSTGRES_DB:?Set POSTGRES_DB}
  SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
  FRONTEND_URL: http://127.0.0.1:${ACCEPTANCE_HTTP_PORT:-18080}
  MINIO_ENDPOINT: minio:9000
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
  MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:?Set MINIO_BUCKET_NAME}
  EXTERNAL_ENDPOINT: http://127.0.0.1:${ACCEPTANCE_HTTP_PORT:-18080}/minio
  REDIS_URL: redis://redis:6379
  DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:?Set DEFAULT_ADMIN_NAME}
  DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?Set DEFAULT_ADMIN_PASSWORD}
  DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:?Set DEFAULT_ADMIN_EMAIL}

services:
  db:
    image: postgres:15.14-alpine3.22
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4.5-alpine3.21
    restart: "no"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: "no"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 30

  migrate:
    image: ${BACKEND_IMAGE}
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: "no"
    command: ["alembic", "upgrade", "head"]
    environment: *backend-environment
    depends_on:
      db:
        condition: service_healthy

  backend:
    image: ${BACKEND_IMAGE}
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: "no"
    environment: *backend-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 2s
      timeout: 3s
      retries: 30

  backend-tests:
    image: pastexam-backend-acceptance-tests:latest
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    restart: "no"
    command: ["pytest", "-q"]
    environment:
      <<: *backend-environment
      TEST_DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${ACCEPTANCE_TEST_DB:?Set ACCEPTANCE_TEST_DB}
    depends_on:
      db:
        condition: service_healthy
    profiles: ["tests"]

  frontend:
    image: ${FRONTEND_IMAGE}
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_SITE_HOSTNAME: ${VITE_SITE_HOSTNAME}
        VITE_UMAMI_SCRIPT_URL: ""
        VITE_UMAMI_WEBSITE_ID: ""
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  nginx:
    image: nginx:1.29.2
    restart: "no"
    ports:
      - "127.0.0.1:${ACCEPTANCE_HTTP_PORT:-18080}:8080"
    volumes:
      - ../proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
